- # ====== Region: Activities ==================================
  id: 156687789817301040620
  identification: 
    name: Activities
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select activity_id,
             type,
             name,
             state,
             error_message,
             due_on,
             retry_count,
             start_time,
             end_time,
             initcap(state) as badge_text,
             case state
                 when 'WAITING'    then 'danger'
                 when 'COMPLETED'  then 'success'
                 when 'TERMINATED' then 'warning'
                 when 'FAULTED'    then 'danger'
             end as badge_state,
             ( select max(workflow_id)
                 from apex_workflows w
                where w.parent_workflow_id = :P5_WORKFLOW_ID
                  and w.parent_activity_id = a.activity_id ) as invoked_workflow_id
        from apex_workflow_activities a
       where workflow_id = :P5_WORKFLOW_ID
       order by start_time
    page-items-to-submit: 
    - P5_WORKFLOW_ID

  order-by: 
    type: None

  layout: 
    sequence: 70
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard
    template-options: 
    - '#DEFAULT#'
    - t-Region--noPadding
    - t-Region--scrollBody
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&NAME.'
      description: '&ERROR_MESSAGE.'
      miscellaneous: |
        {case STATE/}
            {when COMPLETED/}
                &{APEX.WORKFLOW.COMPLETED_SINCE 0=&END_TIME.}.
            {otherwise/}
                &{APEX.WORKFLOW.STARTED_SINCE 0=&START_TIME.}.
        {endcase/}
        {if DUE_ON/}
            <span role="separator" aria-label="&middot;"> &middot; </span>
            &{APEX.WORKFLOW.DUE_SINCE 0=&DUE_ON.}.
        {endif/}
        {if RETRY_COUNT/}
            {case RETRY_COUNT/}
                {when 0/}
                {when 1/}
                <span role="separator" aria-label="&middot;"> &middot; </span>
                    &{APEX.WORKFLOW.RETRY_COUNT.EQUALS_ONE 0=&RETRY_COUNT.}.
                {otherwise/}
                <span role="separator" aria-label="&middot;"> &middot; </span>
                    &{APEX.WORKFLOW.RETRY_COUNT.NOT_EQUALS_ONE 0=&RETRY_COUNT.}.
            {endcase/}
        {endif/}
      display-avatar: false
      display-badge: true

    badge: 
      label: Status
      value: BADGE_TEXT
      state: BADGE_STATE
      display-label: false
      style: Outline
      shape: Default
      size: Default
      column-width: Medium
      position: START
      alignment: START

    appearance: 
      apply-theme-colors: true
      style: Default
      hide-borders: false
      remove-padding: false

    row-selection: 
      type: None

    performance: 
      lazy-loading: false

    pagination: 
      type: Page
      entities-per-page: 10
      show-total-count: false


- # ====== Region: Initiated by Me - Report ====================
  id: 156687770335697040598
  identification: 
    name: Initiated by Me - Report
    type: Content Row

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select workflow_id,
             workflow_def_name,
             workflow_def_app_name,
             title,
             initiator,
             state_code,
             created_on,
             created_ago,
             created_ago_hours,
             last_updated_on,
             badge_text,
             badge_state
        from table ( apex_workflow.get_workflows (
                         p_context => 'INITIATED_BY_ME'
                         --, p_application_id => :APP_ID
                         ) )
    optimizer-hint: APEX$USE_NO_GROUPING_SETS

  order-by: 
    type: Item
    item: 
      item-name: P4_SORT_BY
      order-bys: 
      - key: CREATED_ON
        clause: created_on desc

      - key: LAST_UPDATED_ON
        clause: last_updated_on desc

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Region

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    appearance: 
      display: Multiple (Report)

    settings: 
      title: '&TITLE.'
      description: |
        <strong>&WORKFLOW_DEF_NAME!HTML.</strong>
        
      display-avatar: false
      display-badge: true

    badge: 
      label: State
      value: BADGE_TEXT
      state: BADGE_STATE
      display-label: false
      style: Default
      shape: Default
      size: Default
      column-width: Medium
      position: START
      alignment: START

    appearance: 

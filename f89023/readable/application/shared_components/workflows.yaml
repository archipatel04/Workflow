        compare-type: SQL Query
        compare-query: |
          SELECT 
              CASE
                  WHEN AMOUNT >= 5000 THEN 'GREATER_AMOUNT'
                  WHEN AMOUNT BETWEEN 2500 AND 5000 THEN 'AMOUNT_IN_BETWEEN'
                  WHEN AMOUNT <= 5000 THEN 'LESS_AMOUNT'
              END
          FROM WORKFLOW_CHECK_AMOUNT
          WHERE CA_ID = :CA_ID;

